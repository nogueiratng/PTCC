<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogando: {{ atividade.descricao }}</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f8faff;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            color: #7c83fd;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .enunciado {
            font-size: 3rem;
            color: #333;
            margin: 30px 0;
            font-weight: 900;
        }

        .options-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .option-btn {
            background: #fff;
            border: 4px solid #eee;
            border-radius: 20px;
            font-size: 2.5rem;
            padding: 20px 40px;
            cursor: pointer;
            font-weight: 900;
            color: #555;
            transition: transform 0.2s, border-color 0.2s;
            min-width: 120px;
        }

        .option-btn:hover {
            transform: scale(1.1);
        }

        /* Cores dos botões */
        .btn-A { border-color: #5ba4fc; color: #5ba4fc; }
        .btn-B { border-color: #ffc93c; color: #ffc93c; }
        .btn-C { border-color: #ff8fa3; color: #ff8fa3; }

        .btn-A:hover { background: #5ba4fc; color: white; }
        .btn-B:hover { background: #ffc93c; color: white; }
        .btn-C:hover { background: #ff8fa3; color: white; }

        .feedback {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            min-height: 35px;
        }
        .correct { color: #6ed07a; }
        .wrong { color: #ff5c7c; }

        .game-over {
            display: none;
        }
        
        .game-over h1 {
            color: #7c83fd;
            font-size: 3rem;
        }

        .btn-voltar {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: #6ed07a;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 20px;
            font-size: 1.2rem;
        }
        
        .loading { display: none; margin-top: 10px; color: #555; }
    </style>
</head>
<body>

    <div class="game-container" id="gameScreen">
        <div class="header-info">
            <span>Jogador: {{ crianca.nome }}</span>
            <span>Pontos: <span id="scoreDisplay">0</span></span>
        </div>

        <div id="enunciadoDisplay" class="enunciado">
            Carregando...
        </div>

        <div class="options-container" id="optionsContainer">
            <button class="option-btn btn-A" onclick="checkAnswer('A')" id="btnA">A</button>
            <button class="option-btn btn-B" onclick="checkAnswer('B')" id="btnB">B</button>
            <button class="option-btn btn-C" onclick="checkAnswer('C')" id="btnC">C</button>
        </div>

        <div id="feedbackDisplay" class="feedback"></div>
    </div>

    <!-- Tela de Fim de Jogo -->
    <div class="game-container game-over" id="gameOverScreen">
        <h1>Fim de Jogo! 🏆</h1>
        <p style="font-size: 1.5rem; color: #555;">Você conseguiu <strong id="finalScore" style="color:#ffc93c;"></strong> pontos!</p>
        <p style="font-size: 1.2rem; color: #6ed07a;">Acertos: <span id="finalAcertos">0</span></p>
        <p style="font-size: 1.2rem; color: #ff5c7c;">Erros: <span id="finalErros">0</span></p>
        
        <div id="loadingSave" class="loading">Salvando seu progresso...</div>
        
        <a href="{% url 'users:dashboard' %}" class="btn-voltar" id="btnVoltar" style="display:none;">Voltar para o Painel</a>
    </div>

    <!-- Passando dados do Django para o JS -->
    {{ perguntas_json|json_script:"perguntasData" }}

    <script>
        // Carrega as perguntas que o Django enviou
        const perguntas = JSON.parse(document.getElementById('perguntasData').textContent);
        const criancaId = "{{ crianca.id }}";
        const atividadeId = "{{ atividade.id }}";
        const csrfToken = '{{ csrf_token }}';
        
        let perguntaAtual = 0;
        let acertos = 0;
        let erros = 0;
        let pontuacao = 0;
        const pontosPorAcerto = 20;

        const enunciadoDisplay = document.getElementById('enunciadoDisplay');
        const btnA = document.getElementById('btnA');
        const btnB = document.getElementById('btnB');
        const btnC = document.getElementById('btnC');
        const feedbackDisplay = document.getElementById('feedbackDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const optionsContainer = document.getElementById('optionsContainer');

        function startGame() {
            if (perguntas.length === 0) {
                enunciadoDisplay.innerHTML = "Ops! O professor ainda não adicionou perguntas aqui.";
                optionsContainer.style.display = "none";
                return;
            }
            loadQuestion();
        }

        function loadQuestion() {
            if (perguntaAtual >= perguntas.length) {
                endGame();
                return;
            }

            const p = perguntas[perguntaAtual];
            enunciadoDisplay.innerHTML = p.enunciado;
            btnA.innerHTML = p.opcoes.A;
            btnB.innerHTML = p.opcoes.B;
            btnC.innerHTML = p.opcoes.C;
            
            // Reseta feedback e libera botões
            feedbackDisplay.innerHTML = "";
            btnA.disabled = false;
            btnB.disabled = false;
            btnC.disabled = false;
        }

        function checkAnswer(respostaEscolhida) {
            // Trava botões para não clicar duas vezes
            btnA.disabled = true;
            btnB.disabled = true;
            btnC.disabled = true;

            const p = perguntas[perguntaAtual];
            
            if (respostaEscolhida === p.correta) {
                feedbackDisplay.innerHTML = "🎉 Muito Bem! 🎉";
                feedbackDisplay.className = "feedback correct";
                acertos++;
                pontuacao += pontosPorAcerto;
                scoreDisplay.innerText = pontuacao;
            } else {
                feedbackDisplay.innerHTML = "Ah poxa, quase! 😢";
                feedbackDisplay.className = "feedback wrong";
                erros++;
            }

            // Aguarda 1.5s e vai para a próxima
            setTimeout(() => {
                perguntaAtual++;
                loadQuestion();
            }, 1500);
        }

        function endGame() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'block';
            
            document.getElementById('finalScore').innerText = pontuacao;
            document.getElementById('finalAcertos').innerText = acertos;
            document.getElementById('finalErros').innerText = erros;

            salvarDesempenhoNoBanco();
        }

        function salvarDesempenhoNoBanco() {
            document.getElementById('loadingSave').style.display = 'block';
            
            // Envia os dados para a nossa API do Django
            fetch('/api/salvar-desempenho/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({
                    'crianca_id': criancaId,
                    'atividade_id': atividadeId,
                    'acertos': acertos,
                    'erros': erros,
                    'pontuacao': pontuacao
                })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loadingSave').style.display = 'none';
                document.getElementById('btnVoltar').style.display = 'inline-block';
            })
            .catch(error => {
                console.error("Erro ao salvar:", error);
                document.getElementById('loadingSave').innerHTML = "Erro ao salvar. Pode voltar ao painel.";
                document.getElementById('btnVoltar').style.display = 'inline-block';
            });
        }

        // Inicia o jogo ao carregar a página
        window.onload = startGame;
    </script>
</body>
</html>
